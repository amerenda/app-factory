# Database + BWS password only — no k8s manifests (Homelab Wiki uses compose on Mac Mini).
# Run: make provision APP=wikimedia
# Do not run make create-app / make generate for this spec (generate is a no-op).

[app]
name = "wikimedia"
provision_database_only = true

# generate MUST be false: OpenTofu already writes this key via bitwarden-secrets_secret.db_password.
# generate = true would create a second BWS secret with the same key and break External Secrets.
[[secrets]]
bws_name = "wikimedia-postgres-password"
k8s_secret = "postgres-credentials"
k8s_key = "password"
generate = false

[database]
type = "postgres"
name = "wikimedia"
host = "agent-kb.amer.dev"
extensions = []
password_secret = "wikimedia-postgres-password"

[uat]
enabled = false
